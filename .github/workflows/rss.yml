name: Generate Kabir RSS Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests feedgen

      - name: Run Python script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rss.xml doha.txt
          git commit -m "Automated update of Kabir RSS feed and text file" || exit 0
          git push
